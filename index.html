<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin:0;
  background:#f5f5f5;
}

/* ================= LOGIN BACKGROUND ================= */
#loginBox {
  background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') no-repeat center center;
  background-size: cover;
  padding:30px;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* overlay login */
.login-overlay{
  background: rgba(0,0,0,0.55);
  padding:20px;
  border-radius:12px;
  color:white;
}

/* ================= GENERAL ================= */
.logo { width:90px; margin:15px auto; display:block; }

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
  transition:0.3s;
}

.success { color:green; animation:pop .4s; }
.error { color:red; }

@keyframes pop {
  0%{transform:scale(0.8);}
  100%{transform:scale(1);}
}

#reader {
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

/* flashing scanning */
.scanning {
  animation:flash 0.4s infinite;
}
@keyframes flash {
  0%{box-shadow:0 0 5px #00f;}
  50%{box-shadow:0 0 20px #00f;}
  100%{box-shadow:0 0 5px #00f;}
}

/* panel */
.panel {
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* loading */
.overlay {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid #ccc;
  border-top:5px solid #3498db;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

/* checkmark */
.checkmark {
  font-size:40px;
  color:green;
  animation:pop 0.4s;
}

</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOADING -->
<div id="overlay" class="overlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <div class="login-overlay">
    <h2>Login Sistem</h2>
    <input id="user" placeholder="Username"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>

  <div id="reader"></div>
  <p id="status">Sedang memproses, sila tunggu...</p>
  <p id="result"></p>

  <div id="pdfBox"></div>

  <button onclick="loadRanking()">🏆 Ranking Pelajar</button>

  <div id="rankingBox" class="panel"></div>

  <div id="adminPanel" class="panel" style="display:none;">
    <h3>📊 Dashboard Analytics</h3>
    <p id="totalMurid">-</p>
    <p id="totalHadir">-</p>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz-iETRExzQH4rVbScZ-V29_qGzuC60bJlv1vDsb69h6UAgJLR0m_Wzuu1NgJwY_ZVu/exec";

let role="",scanner,lock=false;

/* ================= LOADING ================= */
function showLoading(t){
  overlay.style.display="flex";
  loadingText.innerText=t;
}
function hideLoading(){
  overlay.style.display="none";
}

/* ================= LOGIN ================= */
function login(){

  showLoading("Logging in...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      alert("Login gagal");
      return;
    }

    role=res.role;
    loginBox.style.display="none";
    dashboard.style.display="block";

    if(role==="guru"||role==="admin"){
      pdfBox.innerHTML=`<button onclick="generatePDF()">📄 Jana PDF</button>`;
    }

    if(role==="admin"){
      adminPanel.style.display="block";
      loadAnalytics();
    }

    startQR();
  });
}

/* ================= QR ================= */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock)return;
      lock=true;

      status.innerText="Sedang memproses, sila tunggu...";
      document.getElementById("reader").classList.add("scanning");

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        document.getElementById("reader").classList.remove("scanning");

        if(res.status==="duplicate"){
          showResult("❌ Sudah scan hari ini","error");
          vibrate("error");
          beep();
          reset();
          return;
        }

        showResult("Sudah direkodkan","success");

        successEffect();
        beepSuccess();
        vibrate("success");

        reset();
      });
    }
  );
}

/* ================= EFFECTS ================= */
function successEffect(){
  confetti({particleCount:120,spread:70});
}

function beep(){
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}
function beepSuccess(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function vibrate(type){
  if(!navigator.vibrate)return;

  if(type==="success") navigator.vibrate([100,50,100,50,200]);
  else navigator.vibrate([300,100,300]);
}

/* ================= RESULT ================= */
function showResult(m,t){
  result.innerHTML = (t==="success") ? "✔ " + m : m;
  result.className=t;

  if(t==="success"){
    result.innerHTML=`<div class="checkmark">✔</div>`+m;
  }
}

/* ================= RESET ================= */
function reset(){
  setTimeout(()=>{
    lock=false;
    status.innerText="Sedang memproses, sila tunggu...";
  },1200);
}

/* ================= PDF ================= */
function generatePDF(){

  showLoading("Generating PDF...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"pdf"})
  })
  .then(r=>r.json())
  .then(res=>{
    hideLoading();
    pdfBox.innerHTML=`<a href="${res.url}" target="_blank">📄 Buka PDF</a>`;
  });
}

/* ================= RANKING ================= */
function loadRanking(){

  rankingBox.innerHTML="Loading ranking...";

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"ranking"})
  })
  .then(r=>r.json())
  .then(res=>{

    let html="<h3>🏆 Top Pelajar</h3>";

    res.forEach((x,i)=>{
      html+=`${i+1}. ${x.nama} - ${x.hadir} hari<br>`;
    });

    rankingBox.innerHTML=html;
  });
}

/* ================= ANALYTICS ================= */
function loadAnalytics(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"analytics"})
  })
  .then(r=>r.json())
  .then(res=>{

    totalMurid.innerText="Total Murid: "+res.totalMurid;
    totalHadir.innerText="Total Hadir: "+res.totalHadir;

    new Chart(chart,{
      type:"bar",
      data:{
        labels:["Hadir","Tidak"],
        datasets:[{data:[res.totalHadir,res.totalTidak]}]
      }
    });
  });
}

</script>
</body>
</html>
