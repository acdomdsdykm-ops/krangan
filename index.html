<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.logo {
  width: 90px;
  margin: 15px auto;
  display: block;
}

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.success { color:green; }
.error { color:red; }

#reader {
  width:300px;
  margin:auto;
}

.panel {
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* ================= LOADING ================= */
.overlay {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid #ccc;
  border-top:5px solid #3498db;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin {
  0% {transform:rotate(0);}
  100% {transform:rotate(360deg);}
}
</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOADING -->
<div id="overlay" class="overlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block;">
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>
  <div id="reader"></div>

  <p id="status">Sedia untuk scan...</p>
  <p id="result"></p>

  <div id="pdfBox"></div>

  <div id="adminPanel" class="panel" style="display:none;">
    <h3>📊 Dashboard Analytics</h3>
    <p id="totalMurid">-</p>
    <p id="totalHadir">-</p>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwyyzXw0lixglC2BLH5ymm5S_sSnmDc2zeUr-TRYeW7YoUkAbLHAlv6nLThtJrbGE0-/exec";

let role="", scanner, scanLock=false;

/* ================= LOADING ================= */
function showLoading(t){
  overlay.style.display="flex";
  loadingText.innerText=t;
}
function hideLoading(){
  overlay.style.display="none";
}

/* ================= LOGIN ================= */
function login(){

  showLoading("Login sistem...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      alert("Login gagal");
      return;
    }

    role=res.role;
    loginBox.style.display="none";
    dashboard.style.display="block";

    if(role==="guru"||role==="admin"){
      pdfBox.innerHTML=`<button onclick="generatePDF()">📄 Jana PDF</button>`;
    }

    if(role==="admin"){
      adminPanel.style.display="block";
      loadAnalytics();
    }

    startQR();
  });
}

/* ================= QR ================= */
function startQR(){
  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(scanLock)return;
      scanLock=true;

      status.innerText="Scanning...";

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        if(res.status==="duplicate"){
          showResult("❌ "+res.message,"error");
          reset();
          return;
        }

        showResult("✅ "+res.nama+" ("+res.kelas+")","success");

        new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
        if(navigator.vibrate) navigator.vibrate([200,100,200]);

        reset();
      });
    }
  );
}

function showResult(m,t){
  result.innerText=m;
  result.className=t;
}

function reset(){
  setTimeout(()=>{
    scanLock=false;
    status.innerText="Sedia untuk scan...";
  },1200);
}

/* ================= PDF ================= */
function generatePDF(){

  showLoading("Menjana PDF...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"pdf"})
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    pdfBox.innerHTML =
      `<a href="${res.url}" target="_blank">📄 Buka PDF</a>`;
  });
}

/* ================= ANALYTICS ================= */
function loadAnalytics(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"analytics"})
  })
  .then(r=>r.json())
  .then(res=>{

    totalMurid.innerText="Total Murid: "+res.totalMurid;
    totalHadir.innerText="Total Hadir: "+res.totalHadir;

    new Chart(chart,{
      type:"bar",
      data:{
        labels:["Hadir","Tidak"],
        datasets:[{data:[res.totalHadir,res.totalTidak]}]
      }
    });

  });
}

</script>
</body>
</html>
