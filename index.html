<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin:0;
  background:#f5f5f5;
}

.logo{width:90px;margin:15px auto;display:block;}

#reader{
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

/* FLASH SCAN ANIMATION */
.scanning{
  animation:flash 0.35s infinite;
}
@keyframes flash{
  0%{box-shadow:0 0 5px #00f;}
  50%{box-shadow:0 0 25px #00f;}
  100%{box-shadow:0 0 5px #00f;}
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(12px);
  padding:25px;
  border-radius:16px;
  color:white;
  min-width:260px;
  animation:pop .25s ease;
}

@keyframes pop{
  from{transform:scale(0.6);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.name{
  font-size:22px;
  font-weight:bold;
  color:#00ff9d;
}

.class{
  font-size:16px;
  margin-top:5px;
}

/* CHECK ANIMATION */
.check{
  font-size:40px;
  animation:pop 0.3s ease;
  color:#00ff9d;
}
</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran</h2>

<div id="reader"></div>
<p id="status">Sedia untuk scan...</p>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card">
    <div class="check">✔</div>
    <div id="pName" class="name"></div>
    <div id="pClass" class="class"></div>
  </div>
</div>

<!-- AUDIO FIX (preload trick supaya tak block) -->
<audio id="beepOk" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="beepError" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>

const API="https://script.google.com/macros/s/AKfycbz-iETRExzQH4rVbScZ-V29_qGzuC60bJlv1vDsb69h6UAgJLR0m_Wzuu1NgJwY_ZVu/exec";

let scanner;
let lock=false;

/* START CAMERA */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      if(lock) return;
      lock=true;

      document.getElementById("reader").classList.add("scanning");
      document.getElementById("status").innerText="Sedang memproses...";

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        document.getElementById("reader").classList.remove("scanning");

        if(res.status==="duplicate"){
          showPopup("Sudah scan hari ini","-");
          playError();
          vibrateError();
          reset();
          return;
        }

        // STATUS DISPLAY
        document.getElementById("status").innerText =
          "👤 " + res.nama + " | 🏫 " + res.kelas;

        showPopup(res.nama,res.kelas);

        playSuccess();
        vibrateSuccess();
        fireConfetti();

        reset();
      });
    }
  );
}

/* POPUP */
function showPopup(name,kelas){

  document.getElementById("pName").innerText=name;
  document.getElementById("pClass").innerText="Kelas: "+kelas;

  const popup=document.getElementById("popup");
  popup.style.display="flex";

  setTimeout(()=>{
    popup.style.display="none";
  },1700);
}

/* 🔊 SOUND FIX (force play user gesture safe) */
function playSuccess(){
  const a=document.getElementById("beepOk");
  a.currentTime=0;
  a.play().catch(()=>{});
}

function playError(){
  const a=document.getElementById("beepError");
  a.currentTime=0;
  a.play().catch(()=>{});
}

/* 💥 CONFETTI FIX */
function fireConfetti(){
  confetti({
    particleCount:120,
    spread:80,
    origin:{y:0.6}
  });
}

/* 📳 VIBRATION */
function vibrateSuccess(){
  if(navigator.vibrate) navigator.vibrate([100,50,200]);
}

function vibrateError(){
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
}

/* RESET */
function reset(){
  setTimeout(()=>{
    lock=false;
    document.getElementById("status").innerText="Sedia untuk scan...";
  },1200);
}

startQR();

</script>

</body>
</html>
