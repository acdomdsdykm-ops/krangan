<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin:0;
  background:#f5f5f5;
}

.logo { width:90px; margin:15px auto; display:block; }

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
  transition:0.3s;
}

.success { color:green; }
.error { color:red; }

#reader {
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

.panel {
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* scanning flash */
.scanning {
  animation:flash 0.4s infinite;
}
@keyframes flash {
  0%{box-shadow:0 0 5px #00f;}
  50%{box-shadow:0 0 20px #00f;}
  100%{box-shadow:0 0 5px #00f;}
}

/* check */
.checkmark {
  font-size:40px;
  color:green;
  animation:pop 0.3s;
}

@keyframes pop {
  0%{transform:scale(0.5);}
  100%{transform:scale(1);}
}

/* login bg */
#loginBox{
  background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block;">
  <div>
    <h2>Login</h2>
    <input id="user" placeholder="Username"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>

  <div id="reader"></div>

  <!-- 🔥 INI YANG DITUKAR (dynamic status) -->
  <p id="status">Sedia untuk scan...</p>

  <p id="result"></p>

  <div id="pdfBox"></div>

  <button onclick="loadRanking()">🏆 Ranking Pelajar</button>
  <div id="rankingBox" class="panel"></div>

  <div id="adminPanel" class="panel" style="display:none;">
    <h3>📊 Dashboard</h3>
    <p id="totalMurid"></p>
    <p id="totalHadir"></p>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz-iETRExzQH4rVbScZ-V29_qGzuC60bJlv1vDsb69h6UAgJLR0m_Wzuu1NgJwY_ZVu/exec";

let role="", scanner, lock=false;

/* LOGIN */
function login(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    if(!res.success){
      alert("Login gagal");
      return;
    }

    role=res.role;
    loginBox.style.display="none";
    dashboard.style.display="block";

    startQR();
  });
}

/* QR SCAN */
function startQR(){

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      if(lock) return;
      lock = true;

      document.getElementById("reader").classList.add("scanning");

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        document.getElementById("reader").classList.remove("scanning");

        // ❗ STATUS DIGANTI NAMA + KELAS
        if(res.status !== "duplicate"){
          status.innerText = `👤 ${res.nama} | 🏫 ${res.kelas}`;
        }

        if(res.status === "duplicate"){
          status.innerText = "❌ Sudah scan hari ini";
          vibrateError();
          beep();
          reset();
          return;
        }

        showResult("Sudah direkodkan","success");

        confetti();
        beepSuccess();
        vibrateSuccess();

        reset();
      });
    }
  );
}

/* RESULT */
function showResult(msg,type){
  result.innerHTML = `<div class="checkmark">✔</div>${msg}`;
  result.className = type;
}

/* EFFECTS */
function confetti(){
  window.confetti({particleCount:100,spread:70});
}

function beep(){
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

function beepSuccess(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function vibrateSuccess(){
  if(navigator.vibrate) navigator.vibrate([100,50,200]);
}

function vibrateError(){
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
}

/* RESET */
function reset(){
  setTimeout(()=>{
    lock=false;
    status.innerText="Sedia untuk scan...";
  },1200);
}

/* RANKING */
function loadRanking(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"ranking"})
  })
  .then(r=>r.json())
  .then(res=>{

    let html="<h3>🏆 Ranking</h3>";

    res.forEach((x,i)=>{
      html += `${i+1}. ${x.nama} - ${x.hadir}<br>`;
    });

    rankingBox.innerHTML = html;
  });
}

</script>

</body>
</html>
