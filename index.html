<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.logo {
  width: 90px;
  margin: 15px auto;
  display: block;
}

.school-title {
  margin: 5px 0;
  font-size: 20px;
  font-weight: bold;
  color: #2c3e50;
}

.school-sub {
  margin: 0;
  font-size: 12px;
  color: #777;
}

.system-title {
  margin-top: 10px;
  font-size: 16px;
  color: #555;
}

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.success { color:green; }
.error { color:red; }

#reader {
  width:300px;
  margin:auto;
}

.panel {
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}

/* ================= LOADING ================= */
.overlay {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

.spinner {
  width:50px;
  height:50px;
  border:5px solid #ccc;
  border-top:5px solid #3498db;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin {
  0% {transform:rotate(0);}
  100% {transform:rotate(360deg);}
}

/* ================= STUDENT CARD ================= */
.card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
  width: 280px;
  opacity: 0;
  transition: all 0.35s ease;
  z-index: 9999;
}

.card.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.card h2 {
  margin: 10px 0;
  color: #2ecc71;
}

.card p {
  margin: 5px 0;
  font-size: 14px;
}

.card .badge {
  display: inline-block;
  padding: 5px 10px;
  background: #2ecc71;
  color: white;
  border-radius: 20px;
  font-size: 12px;
  margin-top: 10px;
}

</style>
</head>

<body>

<img class="logo" src="logo.png">

<h2 class="school-title">SEKOLAH KEBANGSAAN KRANGAN</h2>
<p class="school-sub">Jalan Sekolah, 93000 Kuching, Sarawak</p>

<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOADING -->
<div id="overlay" class="overlay">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block;">
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>
  <div id="reader"></div>

  <p id="status">Sila scan QRCode murid.</p>
  <p id="result"></p>

  <div id="pdfBox"></div>

  <div id="adminPanel" class="panel" style="display:none;">
    <h3>📊 Dashboard Analytics</h3>
    <p id="totalMurid">-</p>
    <p id="totalHadir">-</p>
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- STUDENT CARD -->
<div id="studentCard" class="card">
  <h2 id="cName">Nama</h2>
  <p id="cClass">Kelas</p>
  <div class="badge">✔ HADIR</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwLhmJIGVkEIuZgrV_zr4eYXK2An01Wi6gbc4AMVQJW-Xn_X2p_E5RiCnvZMmDit8bX/exec";

let role="", scanner, scanLock=false;

/* ================= DOM ================= */
const overlay = document.getElementById("overlay");
const loadingText = document.getElementById("loadingText");
const user = document.getElementById("user");
const pass = document.getElementById("pass");
const loginBox = document.getElementById("loginBox");
const dashboard = document.getElementById("dashboard");
const status = document.getElementById("status");
const result = document.getElementById("result");
const pdfBox = document.getElementById("pdfBox");
const adminPanel = document.getElementById("adminPanel");
const totalMurid = document.getElementById("totalMurid");
const totalHadir = document.getElementById("totalHadir");
const chartCanvas = document.getElementById("chart");

/* ================= LOADING ================= */
function showLoading(t){
  overlay.style.display="flex";
  loadingText.innerText=t;
}
function hideLoading(){
  overlay.style.display="none";
}

/* ================= CARD ================= */
function showCard(nama, kelas){

  const card = document.getElementById("studentCard");
  const cName = document.getElementById("cName");
  const cClass = document.getElementById("cClass");

  cName.innerText = nama;
  cClass.innerText = "Kelas: " + kelas;

  card.classList.add("show");

  setTimeout(()=>{
    card.classList.remove("show");
  }, 2500);
}

/* ================= LOGIN ================= */
function login(){

  showLoading("Login sistem...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    if(!res.success){
      alert("Login gagal");
      return;
    }

    role=res.role;
    loginBox.style.display="none";
    dashboard.style.display="block";

    if(role==="guru"||role==="admin"){
      pdfBox.innerHTML=`<button onclick="generatePDF()">📄 Jana PDF</button>`;
    }

    if(role==="admin"){
      adminPanel.style.display="block";
      loadAnalytics();
    }

    startQR();
  });
}

/* ================= QR ================= */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(scanLock)return;
      scanLock=true;

      status.innerText="Scanning...";

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        if(res.status==="duplicate"){
          showResult("❌ "+res.message,"error");
          reset();
          return;
        }

        showResult("✅ "+res.nama+" ("+res.kelas+")","success");

        showCard(res.nama, res.kelas);

        new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
        if(navigator.vibrate) navigator.vibrate([200,100,200]);

        reset();
      });
    }
  );
}

function showResult(m,t){
  result.innerText=m;
  result.className=t;
}

function reset(){
  setTimeout(()=>{
    scanLock=false;
    status.innerText="Sila scan QRCode murid.";
  },1200);
}

/* ================= PDF ================= */
function generatePDF(){

  showLoading("Menjana laporan rasmi...");

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"pdf"})
  })
  .then(r=>r.json())
  .then(res=>{

    hideLoading();

    // buka PDF dalam tab baru
    window.open(res.url, "_blank");

  });
}

/* ================= ANALYTICS ================= */
function loadAnalytics(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"analytics"})
  })
  .then(r=>r.json())
  .then(res=>{

    totalMurid.innerText="Total Murid: "+res.totalMurid;
    totalHadir.innerText="Total Hadir: "+res.totalHadir;

    new Chart(chartCanvas,{
      type:"bar",
      data:{
        labels:["Hadir","Tidak"],
        datasets:[{
          data:[res.totalHadir,res.totalTidak]
        }]
      }
    });

  });
}

</script>
</body>
</html>
