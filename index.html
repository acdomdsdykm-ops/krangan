<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin:0;
  background:#f5f5f5;
}

.logo { width:90px; margin:15px auto; display:block; }

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.success { color:green; }
.error { color:red; }

#reader {
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

.scanning {
  animation:flash 0.4s infinite;
}
@keyframes flash {
  0%{box-shadow:0 0 5px #00f;}
  50%{box-shadow:0 0 20px #00f;}
  100%{box-shadow:0 0 5px #00f;}
}

.checkmark {
  font-size:40px;
  color:green;
  animation:pop 0.3s;
}

@keyframes pop {
  0%{transform:scale(0.5);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block;">
  <h2>Login</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>

  <div id="reader"></div>

  <!-- STATUS UTAMA -->
  <p id="status">Sedia untuk scan...</p>

  <!-- STATUS HASIL -->
  <p id="result"></p>

  <button onclick="loadRanking()">🏆 Ranking</button>
  <div id="rankingBox"></div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbz-iETRExzQH4rVbScZ-V29_qGzuC60bJlv1vDsb69h6UAgJLR0m_Wzuu1NgJwY_ZVu/exec";

let scanner;
let lock = false;

/* LOGIN */
function login(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      user:user.value,
      pass:pass.value
    })
  })
  .then(r=>r.json())
  .then(res=>{

    if(!res.success){
      alert("Login gagal");
      return;
    }

    loginBox.style.display="none";
    dashboard.style.display="block";

    startQR();
  });
}

/* QR START */
function startQR(){

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{

      if(lock) return;
      lock = true;

      document.getElementById("reader").classList.add("scanning");

      // RESET RESULT setiap scan baru
      result.innerHTML = "";
      result.className = "";

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        document.getElementById("reader").classList.remove("scanning");

        /* ❗ DUPLICATE */
        if(res.status === "duplicate"){

          status.innerText = "❌ Sudah direkodkan hari ini";
          showResult("Sudah direkodkan","error");

          vibrateError();
          beep();

          reset();
          return;
        }

        /* ✔ SUCCESS - PAPAR NAMA & KELAS */
        status.innerText = `👤 ${res.nama} | 🏫 ${res.kelas}`;

        showResult("Sudah direkodkan","success");

        confettiEffect();
        beepSuccess();
        vibrateSuccess();

        reset();
      });
    }
  );
}

/* RESULT */
function showResult(text,type){
  result.innerHTML = `<div class="checkmark">✔</div>${text}`;
  result.className = type;
}

/* RESET FLOW */
function reset(){
  setTimeout(()=>{
    lock = false;

    // 🔥 penting: reset balik status default selepas beberapa saat
    status.innerText = "Sedia untuk scan...";
  },1500);
}

/* EFFECTS */
function confettiEffect(){
  confetti({particleCount:120,spread:80});
}

function beep(){
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

function beepSuccess(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function vibrateSuccess(){
  if(navigator.vibrate) navigator.vibrate([100,50,200]);
}

function vibrateError(){
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
}

/* RANKING (optional) */
function loadRanking(){

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"ranking"})
  })
  .then(r=>r.json())
  .then(res=>{

    let html="<h3>🏆 Ranking</h3>";

    res.forEach((x,i)=>{
      html += `${i+1}. ${x.nama} - ${x.hadir}<br>`;
    });

    rankingBox.innerHTML = html;
  });
}

</script>

</body>
</html>
