<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  text-align:center;
  background:#f5f5f5;
}

/* LOGIN */
#loginPage{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e") no-repeat center;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:rgba(0,0,0,0.65);
  padding:25px;
  border-radius:15px;
  color:white;
  width:80%;
}

input,button{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#2ecc71;
  color:white;
}

/* APP */
#app{display:none;}

.logo{width:80px;margin:10px auto;display:block;}

#reader{
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  color:white;
}

/* LOADING */
#loading{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  color:white;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.spinner{
  width:45px;
  height:45px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* BUTTON PDF */
#pdfBtn{
  margin-top:15px;
  background:#3498db;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran</h2>

<div id="reader"></div>

<button id="pdfBtn" onclick="generatePDF()">📄 Print PDF</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card">
    <div>✔ Sudah Direkodkan</div>
    <div id="popName"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxgbEI_GVEccfpNvzs-3ycmTnnSdUaXeWKvcKmtT-lwvwU9d7wJookCHiXLcvy0BS4/exec";

let scanner;
let lock=false;

/* ================= LOGIN ================= */
function login(){
  loading.style.display="flex";
  loadingText.innerText="Login...";

  setTimeout(()=>{
    loading.style.display="none";
    loginPage.style.display="none";
    app.style.display="block";
    startQR();
  },800);
}

/* ================= QR ================= */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock)return;
      lock=true;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        showPopup(res.nama || "OK");

        confetti();

        reset();
      });

    }
  );
}

/* ================= POPUP ================= */
function showPopup(name){
  popName.innerText=name;
  popup.style.display="flex";

  setTimeout(()=>{
    popup.style.display="none";
  },2000);
}

/* ================= FIX PDF (FULL STABLE) ================= */
function generatePDF(){

  loading.style.display="flex";
  loadingText.innerText="Menjana PDF...";

  // 🔥 FIX UTAMA: guna POST (bukan GET)
  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"pdf"})
  })
  .then(r=>r.json())
  .then(res=>{

    loading.style.display="none";

    // 🔥 DEBUG SAFE
    console.log("PDF RESPONSE:",res);

    if(res && res.success && res.url){

      // auto open
      window.open(res.url,"_blank");

    } else {

      alert("PDF gagal dijana. Semak Apps Script / Drive permission");

    }

  })
  .catch(err=>{

    loading.style.display="none";
    console.log(err);
    alert("Server error PDF");

  });
}

/* RESET */
function reset(){
  setTimeout(()=>lock=false,1200);
}

/* CONFETTI */
function confetti(){
  try{
    confettiJS({
      particleCount:100,
      spread:70
    });
  }catch(e){}
}

</script>

</body>
</html>
