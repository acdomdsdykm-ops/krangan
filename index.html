<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  text-align:center;
  background:#f5f5f5;
}

/* LOGIN */
#loginPage{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e") no-repeat center;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box{
  background:rgba(0,0,0,0.65);
  padding:25px;
  border-radius:15px;
  color:white;
  width:80%;
  animation:fadeIn .6s ease;
}

@keyframes fadeIn{
  from{transform:scale(.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

input,button{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#2ecc71;
  color:white;
  cursor:pointer;
}

/* APP */
#app{display:none;}

.logo{width:80px;margin:10px auto;display:block;}

#reader{
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  color:white;
  animation:pop .3s ease;
}

@keyframes pop{
  from{transform:scale(.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.popup-name{
  font-size:22px;
  color:#00ff9d;
  font-weight:bold;
}

/* LOADING */
#loading{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  color:white;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.spinner{
  width:45px;
  height:45px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* PDF BUTTON */
#pdfBtn{
  margin-top:15px;
  background:#3498db;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login Sistem</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran</h2>

<div id="reader"></div>

<button id="pdfBtn" onclick="generatePDF()">📄 Print PDF</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card">
    <div>✔ Sudah Direkodkan</div>
    <div id="popName" class="popup-name"></div>
    <div id="popClass"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxNdX1dMcjA7tHLlavqEmsUPBgYfgYwsOQ0swOfk5zrSxKiXRpvCwjm5QqEYv9gMFpA/exec";

let scanner;
let lock=false;

/* ================= LOGIN ================= */
function login(){

  loading.style.display="flex";
  loadingText.innerText="Login...";

  setTimeout(()=>{
    loading.style.display="none";
    loginPage.style.display="none";
    app.style.display="block";
    startQR();
  },800);
}

/* ================= QR ================= */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock)return;
      lock=true;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        // 🔥 FIX UNDEFINED
        let nama = res.nama || "Tidak Dikenali";
        let kelas = res.kelas || "-";

        if(res.status==="duplicate"){
          showPopup(nama,kelas);
          vibrateError();
          reset();
          return;
        }

        showPopup(nama,kelas);

        confettiEffect();
        beepSuccess();
        vibrateSuccess();

        reset();
      });

    }
  );
}

/* ================= POPUP ================= */
function showPopup(name,kelas){

  popName.innerText=name;
  popClass.innerText="Kelas: "+kelas;

  popup.style.display="flex";

  setTimeout(()=>{
    popup.style.display="none";
  },2000);
}

/* ================= PDF FIX (100% STABLE) ================= */
function generatePDF(){

  loading.style.display="flex";
  loadingText.innerText="Menjana PDF...";

  fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"pdf"})
  })
  .then(r=>r.json())
  .then(res=>{

    loading.style.display="none";

    if(res && res.success && res.url){
      window.open(res.url,"_blank");
    }else{
      alert("PDF gagal dijana");
    }

  })
  .catch(()=>{
    loading.style.display="none";
    alert("Server error PDF");
  });
}

/* ================= EFFECTS ================= */
function confettiEffect(){
  try{
    confetti({
      particleCount:120,
      spread:70,
      origin:{y:0.6}
    });
  }catch(e){}
}

function beepSuccess(){
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function vibrateSuccess(){
  if(navigator.vibrate) navigator.vibrate([100,50,200]);
}

function vibrateError(){
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
}

/* RESET */
function reset(){
  setTimeout(()=>lock=false,1200);
}

</script>

</body>
</html>
