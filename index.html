<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:Arial;
  margin:0;
  text-align:center;
  background:#f5f5f5;
}

/* ================= LOGIN BACKGROUND ================= */
#loginPage{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1441974231531-c6227db76b6e") no-repeat center;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* LOGIN ANIMATION BOX */
.login-box{
  background:rgba(0,0,0,0.65);
  padding:25px;
  border-radius:15px;
  color:white;
  width:80%;
  animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

input,button{
  width:90%;
  padding:12px;
  margin:6px;
  border-radius:8px;
  border:none;
}

button{
  background:#2ecc71;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:active{
  transform:scale(0.95);
}

/* APP */
#app{display:none;}

.logo{width:80px;margin:10px auto;display:block;}

#reader{
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

/* SCANNING */
.scanning{
  animation:flash 0.4s infinite;
}
@keyframes flash{
  0%{box-shadow:0 0 5px #00f;}
  50%{box-shadow:0 0 20px #00f;}
  100%{box-shadow:0 0 5px #00f;}
}

/* POPUP */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  color:white;
}

.popup-name{
  font-size:22px;
  color:#00ff9d;
  font-weight:bold;
}

/* ================= LOADING ================= */
#loading{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.6);
  color:white;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-size:18px;
}

.spinner{
  width:45px;
  height:45px;
  border:5px solid #ccc;
  border-top:5px solid #2ecc71;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-bottom:10px;
}

@keyframes spin{
  0%{transform:rotate(0);}
  100%{transform:rotate(360deg);}
}

/* PDF BUTTON */
#pdfBtn{
  margin-top:10px;
  background:#3498db;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login Sistem</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran</h2>

<div id="reader"></div>

<button id="pdfBtn" onclick="generatePDF()">📄 Print PDF</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card">
    <div>✔ Sudah Direkodkan</div>
    <div id="popName" class="popup-name"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loadingText">Loading...</div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxgbEI_GVEccfpNvzs-3ycmTnnSdUaXeWKvcKmtT-lwvwU9d7wJookCHiXLcvy0BS4/exec";

let scanner;
let lock=false;

/* ================= LOGIN ================= */
function login(){

  document.getElementById("loading").style.display="flex";

  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    startQR();
  },900);
}

/* ================= QR ================= */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock) return;
      lock=true;

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        if(res.status==="duplicate"){
          showPopup("Sudah scan hari ini");
          reset();
          return;
        }

        showPopup(res.nama);
        confetti();
        reset();
      });

    }
  );
}

/* ================= POPUP ================= */
function showPopup(name){
  popName.innerText=name;
  popup.style.display="flex";

  setTimeout(()=>{
    popup.style.display="none";
  },2000);
}

/* ================= FIXED PDF ================= */
function generatePDF(){

  document.getElementById("loading").style.display="flex";
  loadingText.innerText="Menjana PDF...";

  fetch(API+"?action=pdf")
  .then(r=>r.json())
  .then(res=>{

    document.getElementById("loading").style.display="none";

    if(res.success && res.url){
      window.open(res.url,"_blank");
    }else{
      alert("PDF gagal dijana");
    }

  })
  .catch(()=>{
    document.getElementById("loading").style.display="none";
    alert("Server error PDF");
  });
}

/* CONFETTI */
function confetti(){
  confettiJS({
    particleCount:120,
    spread:70,
    origin:{y:0.6}
  });
}

/* RESET */
function reset(){
  setTimeout(()=>lock=false,1200);
}

</script>

</body>
</html>
