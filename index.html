<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.logo {
  width: 90px;
  margin: 15px auto;
  display: block;
}

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.success { color:green; }
.error { color:red; }

#reader {
  width:300px;
  margin:auto;
}

.panel {
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<img class="logo" src="logo.png">

<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block;">
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>
  <div id="reader"></div>
  <p id="result"></p>

  <div id="pdfBox"></div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="panel" style="display:none;">
    <h3>📊 Dashboard Analytics</h3>

    <p id="totalMurid">-</p>
    <p id="totalHadir">-</p>

    <canvas id="chart" width="300" height="200"></canvas>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwC-WiQMxJ99Umpvmucpn_kUMHToSy2KyFn9qVvgtqD3fPjOl5KRR8U6-9aJIcLDLjZ/exec";

let role = "";
let qrScanner;

/* LOGIN */
function login() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      user: user.value,
      pass: pass.value
    })
  })
  .then(r => r.json())
  .then(res => {

    if (!res.success) {
      alert("Login gagal");
      return;
    }

    role = res.role;

    loginBox.style.display = "none";
    dashboard.style.display = "block";

    setupUI();
    startQR();

    if (role === "admin") loadAnalytics();

  });

}

/* UI ROLE */
function setupUI() {

  if (role === "guru" || role === "admin") {
    document.getElementById("pdfBox").innerHTML =
      `<button onclick="generatePDF()">📄 Jana PDF Kehadiran</button>`;
  }

  if (role === "admin") {
    document.getElementById("adminPanel").style.display = "block";
  }
}

/* QR */
function startQR() {

  qrScanner = new Html5Qrcode("reader");

  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      fetch(API, {
        method: "POST",
        body: JSON.stringify({ id: text })
      })
      .then(r => r.json())
      .then(res => {

        if (res.status === "duplicate") {
          result.innerHTML = "❌ " + res.message;
          result.className = "error";
          return;
        }

        result.innerHTML = "✅ " + res.nama + " (" + res.kelas + ")";
        result.className = "success";

      });

    }
  );
}

/* PDF */
function generatePDF() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "pdf" })
  })
  .then(r => r.json())
  .then(res => {
    alert("PDF siap: " + res.url);
    window.open(res.url, "_blank");
  });

}

/* ANALYTICS */
function loadAnalytics() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "analytics" })
  })
  .then(r => r.json())
  .then(res => {

    document.getElementById("totalMurid").innerText =
      "Total Murid: " + res.totalMurid;

    document.getElementById("totalHadir").innerText =
      "Total Kehadiran: " + res.totalHadir;

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: ["Hadir", "Tidak Hadir"],
        datasets: [{
          label: "Kehadiran",
          data: [res.totalHadir, res.totalTidak]
        }]
      }
    });

  });

}

</script>

</body>
</html>
