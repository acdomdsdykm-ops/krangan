<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin:0;
  background:#f5f5f5;
}

.logo{width:90px;margin:15px auto;display:block;}

#reader{
  width:300px;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

/* scanning effect */
.scanning{
  animation:flash 0.4s infinite;
}

@keyframes flash{
  0%{box-shadow:0 0 5px #00f;}
  50%{box-shadow:0 0 20px #00f;}
  100%{box-shadow:0 0 5px #00f;}
}

/* ================= POPUP TRANSPARENT ================= */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup-card{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  padding:25px;
  border-radius:15px;
  color:white;
  min-width:250px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  animation:pop .3s ease;
}

@keyframes pop{
  from{transform:scale(0.5);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

.popup-title{
  font-size:18px;
  margin-bottom:10px;
}

.popup-name{
  font-size:22px;
  font-weight:bold;
  color:#00ff9d;
}

.popup-class{
  font-size:16px;
  margin-top:5px;
}
</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran</h2>

<div id="reader"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card">
    <div class="popup-title">✔ Sudah Direkodkan</div>
    <div id="popName" class="popup-name"></div>
    <div id="popClass" class="popup-class"></div>
  </div>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbz-iETRExzQH4rVbScZ-V29_qGzuC60bJlv1vDsb69h6UAgJLR0m_Wzuu1NgJwY_ZVu/exec";

let scanner;
let lock=false;

/* START QR */
function startQR(){

  scanner=new Html5Qrcode("reader");

  scanner.start(
    {facingMode:"environment"},
    {fps:10,qrbox:250},
    text=>{

      if(lock) return;
      lock=true;

      document.getElementById("reader").classList.add("scanning");

      fetch(API,{
        method:"POST",
        body:JSON.stringify({id:text})
      })
      .then(r=>r.json())
      .then(res=>{

        document.getElementById("reader").classList.remove("scanning");

        if(res.status==="duplicate"){
          showPopup("Sudah scan hari ini","-");
          vibrateError();
          beepError();
          reset();
          return;
        }

        showPopup(res.nama,res.kelas);

        launchConfetti();
        beepSuccess();
        vibrateSuccess();

        reset();
      });

    }
  );
}

/* ================= POPUP ================= */
function showPopup(name,kelas){

  popName.innerText = name;
  popClass.innerText = "Kelas: " + kelas;

  popup.style.display="flex";

  setTimeout(()=>{
    popup.style.display="none";
  },2000);
}

/* ================= EFFECTS ================= */
function launchConfetti(){
  confetti({
    particleCount:120,
    spread:70,
    origin:{y:0.6}
  });
}

/* SOUND */
function beepSuccess(){
  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
  audio.play();
}

function beepError(){
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

/* VIBRATION */
function vibrateSuccess(){
  if(navigator.vibrate) navigator.vibrate([100,50,200]);
}

function vibrateError(){
  if(navigator.vibrate) navigator.vibrate([300,100,300]);
}

/* RESET */
function reset(){
  setTimeout(()=>{
    lock=false;
  },1200);
}

startQR();

</script>

</body>
</html>
