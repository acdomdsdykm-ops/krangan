<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body { font-family: Arial; text-align:center; background:#f5f5f5; }

.logo { width:90px; margin:15px auto; display:block; }

.box { display:none; padding:10px; }

input,button{
  padding:12px;width:85%;margin:6px;border-radius:8px;border:1px solid #ccc;
}

button{background:#3498db;color:white;border:none;cursor:pointer;}

#result{font-size:18px;font-weight:bold;}

.success{color:green;}
.error{color:red;}

#reader{width:300px;margin:auto;}

/* LOGIN LOADING */
#loginLoading,#pdfLoading{
  display:none;
}

.spinner{
  width:30px;height:30px;
  border:4px solid #eee;
  border-top:4px solid #3498db;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{100%{transform:rotate(360deg)}}

/* PDF LOADING */
#pdfLoading{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  color:white;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

</style>
</head>

<body>

<img class="logo" src="logo.png">
<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block">

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="loginLoading">
<div class="spinner"></div>
<p>Logging in...</p>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

<h3>QR Scan</h3>
<div id="reader"></div>

<p id="result"></p>

<button onclick="generatePDF()">📄 Jana PDF</button>

</div>

<!-- PDF LOADING -->
<div id="pdfLoading">
<div class="spinner"></div>
<h3>Menjana PDF...</h3>
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbySag-8wanEUxWTVAElI90pUUGwpwzU8IBxy9mahJHPB9YKdHeHezkP66Cw2dvGSdBJ/exec";

let role="";

function login(){

document.getElementById("loginLoading").style.display="block";

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"login",
user:user.value,
pass:pass.value
})
})
.then(r=>r.json())
.then(res=>{

document.getElementById("loginLoading").style.display="none";

if(!res.success){
alert("Login gagal");return;
}

role=res.role;

loginBox.style.display="none";
dashboard.style.display="block";

startQR();

});

}

function startQR(){

new Html5Qrcode("reader").start(
{facingMode:"environment"},
{fps:10,qrbox:250},
(text)=>{

fetch(API,{
method:"POST",
body:JSON.stringify({id:text})
})
.then(r=>r.json())
.then(res=>{

result.innerText=res.nama+" "+res.kelas;

});

}
);

}

function generatePDF(){

document.getElementById("pdfLoading").style.display="flex";

fetch(API,{
method:"POST",
body:JSON.stringify({action:"pdf"})
})
.then(r=>r.json())
.then(res=>{

document.getElementById("pdfLoading").style.display="none";

window.open(res.url,"_blank");

});

}

</script>

</body>
</html>
