<!DOCTYPE html>
<html lang="ms">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sistem Kehadiran Sekolah</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

.logo {
  width: 90px;
  margin: 15px auto;
  display: block;
}

.box { display:none; padding:10px; }

input, button {
  padding:12px;
  width:85%;
  margin:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#3498db;
  color:white;
  border:none;
  cursor:pointer;
}

#result {
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}

.success { color:green; }
.error { color:red; }

#reader {
  width:300px;
  margin:auto;
}

.panel {
  margin-top:15px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<img class="logo" src="logo.png">

<h2>🏫 Sistem Kehadiran Sekolah</h2>

<!-- LOGIN -->
<div id="loginBox" class="box" style="display:block;">
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">

  <h3>📷 QR Scan</h3>
  <div id="reader"></div>

  <p id="status">Sedia untuk scan...</p>
  <p id="result"></p>

  <div id="pdfBox"></div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="panel" style="display:none;">
    <h3>📊 Dashboard Analytics</h3>

    <p id="totalMurid">-</p>
    <p id="totalHadir">-</p>

    <canvas id="chart" width="300" height="200"></canvas>
  </div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbx0tWu7C33jqeoAq4x2CpuJxCCGtO2l1SQPsyDp8qbBFhJQA_dNA1ruD6pFyZgDdH0o/exec";

let role = "";
let qrScanner;
let scanning = false;

/* ================= LOGIN ================= */
function login() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      user: user.value,
      pass: pass.value
    })
  })
  .then(r => r.json())
  .then(res => {

    if (!res.success) {
      alert("Login gagal");
      return;
    }

    role = res.role;

    loginBox.style.display = "none";
    dashboard.style.display = "block";

    setupUI();
    startQR();

    if (role === "admin") loadAnalytics();

  });

}

/* ================= UI ================= */
function setupUI() {

  if (role === "guru" || role === "admin") {
    document.getElementById("pdfBox").innerHTML =
      `<button onclick="generatePDF()">📄 Jana PDF Kehadiran</button>`;
  }

  if (role === "admin") {
    document.getElementById("adminPanel").style.display = "block";
  }
}

/* ================= QR SCAN ================= */
function startQR() {

  qrScanner = new Html5Qrcode("reader");

  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {

      if (scanning) return;
      scanning = true;

      document.getElementById("status").innerText = "🔄 Memproses...";

      fetch(API, {
        method: "POST",
        body: JSON.stringify({ id: text })
      })
      .then(r => r.json())
      .then(res => {

        if (res.status === "duplicate") {
          showResult("❌ " + res.message, "error");
          resetScan();
          return;
        }

        showResult("✅ " + res.nama + " (" + res.kelas + ")", "success");

        // 🔊 SOUND
        playBeep();

        // 📳 VIBRATE (mobile only)
        vibratePhone();

        resetScan();

      })
      .catch(() => {
        showResult("❌ Error server", "error");
        resetScan();
      });

    }
  );
}

/* ================= RESULT ================= */
function showResult(msg, type) {
  const r = document.getElementById("result");
  r.innerText = msg;
  r.className = type;
}

/* ================= RESET SCAN ================= */
function resetScan() {
  setTimeout(() => {
    scanning = false;
    document.getElementById("status").innerText = "Sedia untuk scan...";
  }, 1200);
}

/* ================= 🔊 BEEP SOUND ================= */
function playBeep() {
  try {
    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
    audio.play();
  } catch (e) {}
}

/* ================= 📳 VIBRATION ================= */
function vibratePhone() {
  try {
    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200]); // pattern getar
    }
  } catch (e) {}
}

/* ================= PDF ================= */
function generatePDF() {

  document.getElementById("pdfBox").innerHTML = "⏳ Menjana PDF...";

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "pdf" })
  })
  .then(r => r.json())
  .then(res => {

    document.getElementById("pdfBox").innerHTML =
      `<a href="${res.url}" target="_blank">📄 Buka PDF</a>`;

  });

}

/* ================= ANALYTICS ================= */
function loadAnalytics() {

  fetch(API, {
    method: "POST",
    body: JSON.stringify({ action: "analytics" })
  })
  .then(r => r.json())
  .then(res => {

    document.getElementById("totalMurid").innerText =
      "Total Murid: " + res.totalMurid;

    document.getElementById("totalHadir").innerText =
      "Total Kehadiran: " + res.totalHadir;

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: ["Hadir", "Tidak Hadir"],
        datasets: [{
          label: "Kehadiran",
          data: [res.totalHadir, res.totalTidak]
        }]
      }
    });

  });

}

</script>

</body>
</html>
